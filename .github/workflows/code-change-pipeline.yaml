name: Docker Build and Deploy

on:
  workflow_run:
    workflows: ["Terraform CICD"]
    types:
      - completed

permissions:
  contents: read

env:
  AWS_REGION: eu-west-2
  ECR_REPOSITORY: the-url-app-hub
  SOURCE_IMAGE: moabukar/the-app-hub:22e0324

jobs:
  build-and-deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Pull, tag, and push image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          set -euo pipefail

          TARGET_IMAGE="${REGISTRY}/${ECR_REPOSITORY}:22e0324"

          echo "Pulling source image..."
          docker pull "${SOURCE_IMAGE}"

          echo "Tagging image for ECR..."
          docker tag "${SOURCE_IMAGE}" "${TARGET_IMAGE}"

          echo "Pushing image to ECR..."
          docker push "${TARGET_IMAGE}"

          echo "Pushed ${TARGET_IMAGE}"